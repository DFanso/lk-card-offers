name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    env:
      # Build only needs these to be present; values are not used at compile.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/lk_card_offers
      AUTH_SECRET: ci-build-secret-not-used-at-runtime
      NEXTAUTH_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
