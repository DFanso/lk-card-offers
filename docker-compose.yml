# One-command local stack: Postgres + app.
# Usage:
#   cp .env.example .env   # fill in AUTH_SECRET (openssl rand -base64 32)
#   docker compose up --build
#
# The app entrypoint waits for Postgres, then creates the database (if
# missing), applies migrations, seeds reference data, and starts Next.js.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Default to the compose-managed Postgres. Override DATABASE_URL when
      # pointing at a managed DB.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/lk_card_offers}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required — run `openssl rand -base64 32`}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      CRON_SECRET: ${CRON_SECRET:-change-me}
      SEED_SUPERADMIN_EMAIL: ${SEED_SUPERADMIN_EMAIL:-super@example.com}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD:-password123}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      # Persist user uploads across container rebuilds.
      - uploads:/app/public/uploads

volumes:
  db_data:
  uploads:
